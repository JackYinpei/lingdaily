name: Pull Request Quality

on:
  pull_request:
    branches: [main]

concurrency:
  group: pull-request-quality-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings=0

      - name: Unit tests
        run: npm test

      - name: Migration smoke tests
        run: npm run test:migrations

      - name: Production build
        run: npm run build
