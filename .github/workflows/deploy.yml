name: Build and Deploy

on:
  push:
    branches: [main]

concurrency:
  group: lingdaily-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: jackyinpei/lingdaily

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings)
        run: npm run lint -- --max-warnings=0

      - name: Unit tests
        run: npm test

      - name: Migration smoke tests
        run: npm run test:migrations

      - name: Production build
        run: npm run build

  build-and-push:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_GEMINI_BASE_URL=${{ secrets.NEXT_PUBLIC_GEMINI_BASE_URL }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -f ~/lingdaily/docker-compose.yml pull
            docker compose -f ~/lingdaily/docker-compose.yml up -d
            docker image prune -f
