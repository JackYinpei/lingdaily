services:
  app:
    image: ghcr.io/jackyinpei/lingdaily:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PODCAST_TIMEZONE: ${PODCAST_TIMEZONE:-Asia/Shanghai}
    volumes:
      - ./podcasts:/app/public/podcasts
    restart: unless-stopped
