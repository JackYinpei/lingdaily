# Gemini API 反向代理配置
# 用于国内用户无法直连 Google Gemini API 时，通过海外服务器中转
#
# 使用方法:
# 1. 将此文件复制到 Nginx 配置目录 (如 /etc/nginx/conf.d/)
# 2. 替换 server_name 为你的代理域名
# 3. 替换 SSL 证书路径
# 4. 在项目 .env.local 中设置 NEXT_PUBLIC_GEMINI_BASE_URL=https://<YOUR_PROXY_DOMAIN>
# 5. 执行 nginx -t && nginx -s reload

server {
    listen 443 ssl;
    server_name api.talknews.ai;  # 替换为你的代理域名

    # SSL 证书配置
    ssl_certificate     /path/to/your/fullchain.pem;
    ssl_certificate_key /path/to/your/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ============================================
    # WebSocket 代理 (Gemini Live API)
    # ============================================
    # @google/genai SDK 的 live.connect() 会连接 /ws/ 路径
    location /ws/ {
        proxy_pass https://generativelanguage.googleapis.com;
        proxy_set_header Host generativelanguage.googleapis.com;

        # WebSocket 升级所需的关键头部
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 长连接超时 (Gemini Live 会话可能持续很久)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 禁用缓冲，实时转发音频流
        proxy_buffering off;

        # 上游 HTTPS/SNI
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # 透传客户端信息
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # HTTP API 代理 (Token 创建等 REST 请求)
    # ============================================
    location / {
        proxy_pass https://generativelanguage.googleapis.com;
        proxy_set_header Host generativelanguage.googleapis.com;

        proxy_http_version 1.1;

        # 禁用缓冲，支持 SSE 流式响应
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # 上游 HTTPS/SNI
        proxy_ssl_server_name on;
        proxy_ssl_protocols TLSv1.2 TLSv1.3;

        # 透传客户端信息
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
